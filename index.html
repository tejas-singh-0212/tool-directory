<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tool Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
    <div class="floating-controls">
        <div class="tool-counter" title="Total tools" aria-label="Total tools">TOOLS: 0</div>
        <button class="theme-toggle" onclick="toggleTheme()">LIGHT_MODE</button>
    </div>

    <header class="site-header">
        <h1>Ultimate Tool Directory</h1>
        <p>
            A searchable collection of useful AI, coding, design, productivity, learning, and utility tools.
        </p>
    </header>

    <label for="toolSearch" class="sr-only">Search tools</label>
    <input
        type="text"
        id="toolSearch"
        onkeyup="searchTable()"
        placeholder="Search for tools..."
        autocomplete="off"
    >

    <div class="filter-bar">
        <label for="categoryFilter" class="sr-only">Filter tools by category</label>
        <select id="categoryFilter" aria-label="Filter tools by category">
            <option value="all">All categories</option>
        </select>
    </div>
    
    <div class="table-wrap" tabindex="0" aria-label="Scrollable tools table">
        <table id="myTable">
            <caption class="sr-only">
                Searchable directory of tools with names, purposes, and links.
            </caption>

            <thead>
                <tr>
                    <th scope="col">Name</th>
                    <th scope="col">Purpose</th>
                    <th scope="col" class="copy-col">Link</th>
                </tr>
            </thead>

            <tbody id="toolTableBody"></tbody>
        </table>
    </div>

    <p id="noResults" style="text-align:center; display:none; margin-top:20px; color:#f0f;">
        No matching tools found.
    </p>

    <script src="script.js?v=3"></script>

    <div id="toast" role="status" aria-live="polite" aria-atomic="true">
        Link copied to clipboard!
    </div>
</body>

</html>
