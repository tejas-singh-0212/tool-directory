<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Tool Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%A1%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="style.css?v=2">
</head>

<body>
    <button class="theme-toggle" onclick="toggleTheme()">LIGHT_MODE</button>
    <input type="text" id="toolSearch" onkeyup="searchTable()" placeholder="Search for tools...">

    <table id="myTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Purpose</th>
            <th class="copy-col">Link</th>
            </tr>
        </thead>
        <tbody id="toolTableBody"></tbody>
    </table>

    <p id="noResults" style="text-align:center; display:none; margin-top:20px; color:#f0f;">
        No matching tools found.
    </p>

    <script src="script.js?v=2"></script>
</body>

</html>
